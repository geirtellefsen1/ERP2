# ─────────────────────────────────────────────────────────────────────────────
# ClaudERP — Production Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
#
# This file lives at /opt/claud-erp/docker-compose.prod.yml on the droplet.
# It pulls pre-built images from the DigitalOcean container registry rather
# than building from source — DO NOT use this with `docker compose build`.
#
# Differences from the dev docker-compose.yml at the repo root:
#   - Pulls images from registry.digitalocean.com (no local builds)
#   - No source-code volume mounts (would shadow the production code)
#   - No `pnpm dev` or uvicorn --reload (uses production servers)
#   - Reads runtime env vars from /etc/claud-erp/.env
#   - Web is exposed on host port 3002 (not 3000) to coexist with the
#     legacy bpo-nexus deployment if it's on the same droplet
#   - Database and Redis ports are NOT exposed to the host
#   - All services have health checks and named container names
#
# ─────────────────────────────────────────────────────────────────────────────
# Usage on the droplet
# ─────────────────────────────────────────────────────────────────────────────
#
#   # Pull a specific tagged release and start it
#   TAG=abc1234 docker compose -f /opt/claud-erp/docker-compose.prod.yml pull
#   TAG=abc1234 docker compose -f /opt/claud-erp/docker-compose.prod.yml up -d
#
#   # Inspect status
#   docker compose -f /opt/claud-erp/docker-compose.prod.yml ps
#
#   # Tail logs
#   docker compose -f /opt/claud-erp/docker-compose.prod.yml logs -f api
#
#   # Roll back to a previous tag
#   TAG=<previous-sha> docker compose -f /opt/claud-erp/docker-compose.prod.yml up -d
#
# ─────────────────────────────────────────────────────────────────────────────
# Required env file: /etc/claud-erp/.env
# ─────────────────────────────────────────────────────────────────────────────
#
# Must contain at minimum:
#   POSTGRES_USER=claud_erp
#   POSTGRES_PASSWORD=<long-random-string>
#   POSTGRES_DB=claud_erp
#   DATABASE_URL=postgresql://claud_erp:<password>@db:5432/claud_erp
#   REDIS_URL=redis://redis:6379/0
#   CORS_ORIGINS=http://<droplet-ip>:3002,http://<droplet-ip>:8000
#   CLAUDE_API_KEY=sk-ant-...
#
# Optional (OAuth, Spaces, Auth0) — see .env.example in the repo root.
#
# ─────────────────────────────────────────────────────────────────────────────
# Using a managed database instead of the local Postgres container
# ─────────────────────────────────────────────────────────────────────────────
#
# If you have a DigitalOcean Managed Postgres, comment out the entire `db`
# service below and the `claud-erp-pgdata` volume, then point DATABASE_URL
# in /etc/claud-erp/.env at the managed connection string. Same for Redis.
#
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    image: registry.digitalocean.com/claud-erp/api:${TAG:-latest}
    container_name: claud-erp-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - /etc/claud-erp/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      - claud-erp

  web:
    image: registry.digitalocean.com/claud-erp/web:${TAG:-latest}
    container_name: claud-erp-web
    restart: unless-stopped
    ports:
      # Host port 3002 -> container port 3000.
      # 3002 avoids clashing with the legacy bpo-nexus deployment on 3000.
      - "3002:3000"
    env_file:
      - /etc/claud-erp/.env
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - claud-erp

  db:
    image: postgres:16-alpine
    container_name: claud-erp-db
    restart: unless-stopped
    env_file:
      - /etc/claud-erp/.env
    volumes:
      - claud-erp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U $${POSTGRES_USER:-claud_erp} -d $${POSTGRES_DB:-claud_erp}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - claud-erp
    # NOT exposed to host. Only the API container can reach it via the
    # claud-erp network. Uncomment ONLY for one-off debugging:
    # ports:
    #   - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    container_name: claud-erp-redis
    restart: unless-stopped
    volumes:
      - claud-erp-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claud-erp
    # NOT exposed to host.

volumes:
  claud-erp-pgdata:
  claud-erp-redisdata:

networks:
  claud-erp:
    driver: bridge
    name: claud-erp
