name: CI — BPO Nexus

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-test:
    name: API (Python 3.12)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bpo_nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -q -r requirements.txt
      - name: Start server
        run: |
          cd apps/api
          uvicorn app.main:app --port 8000 &
          sleep 4
      - name: Health check
        run: |
          curl -s http://localhost:8000/health

  web-test:
    name: Web (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: "9"
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm --filter @bpo-nexus/web build

  docker-test:
    name: Docker Compose
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/bpo_nexus
          REDIS_URL=redis://redis:6379/0
          AUTH0_DOMAIN=ci-test.auth0.com
          AUTH0_AUDIENCE=https://api.bponexus.com
          CLAUDE_API_KEY=sk-ci-test-placeholder
          EOF
      - name: Build API image
        run: docker compose build api
      - name: Start DB and Redis
        run: docker compose up -d db redis
      - name: Start API
        run: docker compose up -d api
        timeout-minutes: 5
      - name: Health check
        run: |
          sleep 5
          docker compose exec -T api curl -f http://localhost:8000/health
      - name: Teardown
        if: always()
        run: docker compose down -v
